<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mood Quote Generator</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="/style.css" />

</head>
<body>

<div class="app-container">
  <h2 class="title text-center">Share Your Mood</h2>
  <p class="subtitle text-center">Tell us how you're feeling — get a quote just for you</p>

  <div class="mb-3">
    <label for="name" class="form-label">Your Name</label>
    <input type="text" class="form-control" id="name" placeholder="e.g. Alex">
  </div>

  <div class="mb-3">
    <label for="mood" class="form-label">How are you feeling today?</label>
    <input type="text" class="form-control" id="mood" placeholder="happy, sad, tired, angry, missing...">
  </div>

  <button class="btn btn-generate w-100" id="generate">
    Generate Quote
  </button>

  <div id="quote" class="text-center"></div>
</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="/javascript.js"></script>
</body>
</html>
